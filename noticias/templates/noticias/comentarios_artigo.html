<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Comentários - {{ artigo.titulo }}</title>
</head>
<body>
    <a href="{% url 'detalhe_artigo' artigo.id %}">← Voltar ao artigo</a>
    
    <hr>
    
    <h1>Comentários sobre: {{ artigo.titulo }}</h1>
    
    <ul>
        {% for comentario in comentarios %}
            <li>
                <p>{{ comentario.texto_comentario }}</p>
            </li>
        {% empty %}
            <p>Ainda não há comentários. Sê o primeiro a comentar!</p>
        {% endfor %}
    </ul>
    
    <hr>
    
    <h3>Deixar um comentário</h3>
    <form method="POST">
        {% csrf_token %} <textarea name="texto_comentario" rows="4" cols="50" placeholder="Escreve aqui o teu comentário..." required></textarea>
        <br><br>
        <button type="submit">Submeter Comentário</button>
    </form>
    
</body>
</html>
