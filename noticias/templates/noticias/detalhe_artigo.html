{% extends 'noticias/base.html' %}

{% block titulo %}{{ artigo.titulo }} - O Meu Jornal{% endblock %}

{% block conteudo %}
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-5">
            <h1 class="display-5 fw-bold mb-4">{{ artigo.titulo }}</h1>
            <div class="fs-5 lh-lg text-dark">
                {{ artigo.corpo_texto|linebreaksbr }}
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between mb-5">
        <a href="{% url 'lista_artigos' %}" class="btn btn-secondary">&larr; Voltar à página inicial</a>
        <a href="{% url 'comentarios_artigo' artigo.id %}" class="btn btn-primary">Ver / Adicionar Comentários 💬</a>
    </div>
{% endblock %}
